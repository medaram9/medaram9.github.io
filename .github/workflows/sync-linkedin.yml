name: Sync LinkedIn to Portfolio

on:
  push:
    paths:
      - 'linkedin-profile.md'
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenAI SDK
        run: pip install openai --quiet

      - name: Generate portfolio changes via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_linkedin.py

      - name: Check if index.html was modified
        id: changes
        run: |
          if git diff --quiet index.html; then
            echo "detected=false" >> "$GITHUB_OUTPUT"
            echo "No changes — portfolio already matches linkedin-profile.md"
          else
            echo "detected=true" >> "$GITHUB_OUTPUT"
            git diff --stat index.html
          fi

      - name: Create branch and open PR
        if: steps.changes.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%Y%m%d-%H%M%S')
          BRANCH="linkedin-sync-${DATE}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add index.html
          git commit -m "chore: sync portfolio with LinkedIn updates (${DATE})"
          git push origin "$BRANCH"

          gh pr create \
            --title "LinkedIn Sync — $(date +'%B %d, %Y')" \
            --body "$(cat /tmp/pr_description.md)" \
            --base main \
            --head "$BRANCH"

          echo "PR created. Review the diff and merge when ready."

      - name: Already in sync
        if: steps.changes.outputs.detected == 'false'
        run: echo "Portfolio already reflects linkedin-profile.md. No PR created."
