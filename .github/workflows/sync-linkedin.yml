name: Sync LinkedIn to Portfolio

# ─── How this works ────────────────────────────────────────────────────────
# 1. You update your LinkedIn profile.
# 2. Edit linkedin-profile.md in this repo to match (GitHub web UI is fine).
# 3. Commit directly to main — this Action fires automatically.
# 4. Claude reads linkedin-profile.md + index.html and opens a PR with
#    the proposed site changes.
# 5. You review the diff → merge to publish. Nothing goes live until you merge.
#
# Manual fallback: Actions → "Sync LinkedIn to Portfolio" → Run workflow

on:
  push:
    paths:
      - 'linkedin-profile.md'
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Anthropic SDK
        run: pip install anthropic --quiet

      - name: Generate portfolio changes via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/sync_linkedin.py

      - name: Check if index.html was modified
        id: changes
        run: |
          if git diff --quiet index.html; then
            echo "detected=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No changes — portfolio already matches linkedin-profile.md"
          else
            echo "detected=true" >> "$GITHUB_OUTPUT"
            git diff --stat index.html
          fi

      - name: Create branch and open PR
        if: steps.changes.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%Y%m%d-%H%M%S')
          BRANCH="linkedin-sync-${DATE}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add index.html
          git commit -m "chore: sync portfolio with LinkedIn updates (${DATE})"
          git push origin "$BRANCH"

          gh pr create \
            --title "🔄 LinkedIn Sync — $(date +'%B %d, %Y')" \
            --body "$(cat /tmp/pr_description.md)" \
            --base main \
            --head "$BRANCH"

          echo "✅ PR created. Review the diff and merge when ready."

      - name: Already in sync
        if: steps.changes.outputs.detected == 'false'
        run: echo "✅ Portfolio already reflects linkedin-profile.md. No PR created."
