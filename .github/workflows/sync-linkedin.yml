name: Sync LinkedIn to Portfolio

# ─── Triggers ──────────────────────────────────────────────────────────────
# A) repository_dispatch (type: linkedin-profile-updated)
#    Fired by Make.com when it detects a LinkedIn profile change.
#    client_payload contains the updated LinkedIn fields directly.
#    Claude runs immediately and opens a PR — no manual step needed.
#
# B) workflow_dispatch
#    Manual fallback. Run from the GitHub Actions UI and paste
#    what changed on LinkedIn. Useful if Make.com misses something.

on:
  repository_dispatch:
    types: [linkedin-profile-updated]

  workflow_dispatch:
    inputs:
      linkedin_changes:
        description: >
          Paste what changed on LinkedIn — headline, about, certifications,
          new numbers, new projects, etc. Be as detailed as possible.
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Anthropic SDK
        run: pip install anthropic --quiet

      # Build LINKEDIN_CHANGES from whichever trigger fired
      - name: Prepare LinkedIn changes (Make.com payload)
        if: github.event_name == 'repository_dispatch'
        run: |
          cat <<'PAYLOAD' > /tmp/linkedin_changes.txt
          ${{ toJSON(github.event.client_payload) }}
          PAYLOAD
          echo "SOURCE=make.com" >> "$GITHUB_ENV"

      - name: Prepare LinkedIn changes (manual input)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cat <<'INPUT' > /tmp/linkedin_changes.txt
          ${{ github.event.inputs.linkedin_changes }}
          INPUT
          echo "SOURCE=manual" >> "$GITHUB_ENV"

      - name: Generate portfolio changes via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CHANGES_FILE: /tmp/linkedin_changes.txt
        run: python scripts/sync_linkedin.py

      - name: Check if index.html was modified
        id: changes
        run: |
          if git diff --quiet index.html; then
            echo "detected=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No changes detected — portfolio already matches."
          else
            echo "detected=true" >> "$GITHUB_OUTPUT"
            git diff --stat index.html
          fi

      - name: Create branch and open PR
        if: steps.changes.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%Y%m%d-%H%M%S')
          HUMAN_DATE=$(date +'%B %d, %Y at %H:%M UTC')
          BRANCH="linkedin-sync-${DATE}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add index.html
          git commit -m "chore: sync portfolio with LinkedIn updates (${DATE})"
          git push origin "$BRANCH"

          gh pr create \
            --title "🔄 LinkedIn Sync — ${HUMAN_DATE}" \
            --body "$(cat /tmp/pr_description.md)" \
            --base main \
            --head "$BRANCH"

          echo "✅ PR created — review the diff and merge when ready."

      - name: Already in sync
        if: steps.changes.outputs.detected == 'false'
        run: echo "✅ Portfolio already reflects these LinkedIn updates. No PR created."
